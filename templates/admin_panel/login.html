<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Kakahoyan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --gold:#C9A84C; --charcoal:#1A1A1A; }
    body { background:#F4F2ED; font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border:1px solid #E8E4DB; padding:3rem 2.5rem; width:100%; max-width:400px; }
    .login-logo { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; color:var(--charcoal); letter-spacing:0.1em; }
    .login-logo span { color:var(--gold); }
    .form-control { border-radius:0; font-family:'DM Sans',sans-serif; font-size:0.9rem; }
    .form-control:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,168,76,0.15); }
    .form-label { font-size:0.78rem; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; }
    .btn-login { background:var(--gold); color:var(--charcoal); border:none; border-radius:0; font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; padding:0.75rem; width:100%; }
    .btn-login:hover { background:#E8C97A; color:var(--charcoal); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo mb-1">KAKA<span>HOYAN</span></div>
    <div style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:#7A7060;margin-bottom:2rem">Admin Panel</div>

    {% if form.errors %}
    <div class="alert alert-danger" style="font-size:0.82rem;border-radius:0;border-left:3px solid #dc3545;padding:0.6rem 0.9rem">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="mt-3 text-center">
      <a href="/" style="font-size:0.78rem;color:#7A7060;text-decoration:none">← Back to site</a>
    </div>
  </div>
</body>
</html>
