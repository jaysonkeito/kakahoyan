{% extends 'admin_panel/base.html' %}
{% block title %}Upload Media — Kakahoyan Admin{% endblock %}
{% block nav_media %}active{% endblock %}
{% block page_title %}Upload Media{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="stat-card">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" style="font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:500">Files *</label>
          <input type="file" name="files" multiple accept="image/*,video/*" class="form-control" style="border-radius:0" required>
          <div class="form-text">You can select multiple photos or videos at once.</div>
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:500">Title (optional)</label>
          <input type="text" name="title" class="form-control" style="border-radius:0" placeholder="e.g. Glass Pavilion Setup">
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label" style="font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:500">Media Type</label>
            <select name="media_type" class="form-select" style="border-radius:0">
              <option value="photo">Photo</option>
              <option value="video">Video</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" style="font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:500">Category</label>
            <select name="category" class="form-select" style="border-radius:0">
              <option value="">— None —</option>
              {% for cat in categories %}
              <option value="{{ cat.pk }}">{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="mb-4">
          <div class="form-check">
            <input type="checkbox" name="is_featured" id="is_featured" class="form-check-input">
            <label for="is_featured" class="form-check-label" style="font-size:0.85rem">
              Mark as featured (shows on homepage)
            </label>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn-gold btn px-4"><i class="bi bi-cloud-upload me-2"></i>Upload</button>
          <a href="{% url 'admin_panel:media_list' %}" class="btn btn-outline-secondary" style="border-radius:0;font-size:0.82rem">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
